<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 120" width="750" height="120">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .txt {
        font-family: monospace;
        font-size: 52px;
        fill: #ff1a1a;
        filter: url(#glow);
        letter-spacing: 8px;
      }
      .letter { opacity: 0; }
      .l1  { animation: show 0.05s 0.2s  forwards, flicker 3s 2s infinite; }
      .l2  { animation: show 0.05s 0.4s  forwards, flicker 3s 2.2s infinite; }
      .l3  { animation: show 0.05s 0.6s  forwards, flicker 3s 2.4s infinite; }
      .l4  { animation: show 0.05s 0.8s  forwards, flicker 3s 2.6s infinite; }
      .l5  { animation: show 0.05s 1.0s  forwards, flicker 3s 2.8s infinite; }
      .l6  { animation: show 0.05s 1.2s  forwards, flicker 3s 3.0s infinite; }
      .l7  { animation: show 0.05s 1.5s  forwards, flicker 3s 3.2s infinite; }
      .l8  { animation: show 0.05s 1.7s  forwards, flicker 3s 3.4s infinite; }
      .l9  { animation: show 0.05s 1.9s  forwards, flicker 3s 3.6s infinite; }
      .l10 { animation: show 0.05s 2.1s  forwards, flicker 3s 3.8s infinite; }
      .l11 { animation: show 0.05s 2.3s  forwards, flicker 3s 4.0s infinite; }
      .l12 { animation: show 0.05s 2.5s  forwards, flicker 3s 4.2s infinite; }
      .l13 { animation: show 0.05s 2.7s  forwards, flicker 3s 4.4s infinite; }
      @keyframes show { to { opacity: 1; } }
      @keyframes flicker {
        0%,89%,91%,93%,100% { opacity: 1; }
        90%,92% { opacity: 0.1; }
      }
      .cursor {
        fill: #ff1a1a;
        filter: url(#glow);
        animation: blink 0.7s step-end infinite, movecur 2.9s steps(14,end) forwards;
        opacity: 0;
      }
      @keyframes blink {
        0%,100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes movecur {
        0%   { transform: translateX(0px); opacity: 1; }
        100% { transform: translateX(630px); opacity: 1; }
      }
    </style>
  </defs>

  <!-- underline -->
  <rect x="30" y="98" width="0" height="3" fill="#ff1a1a" opacity="0.6">
    <animate attributeName="width" from="0" to="660" begin="2.9s" dur="0.3s" fill="freeze"/>
  </rect>

  <!-- cursor bar -->
  <rect class="cursor" x="30" y="38" width="3" height="55"/>

  <text class="txt" x="30" y="90">
    <tspan class="letter l1">A</tspan>
    <tspan class="letter l2">C</tspan>
    <tspan class="letter l3">C</tspan>
    <tspan class="letter l4">E</tspan>
    <tspan class="letter l5">S</tspan>
    <tspan class="letter l6">S</tspan>
    <tspan dx="20" class="letter l7">D</tspan>
    <tspan class="letter l8">E</tspan>
    <tspan class="letter l9">N</tspan>
    <tspan class="letter l10">I</tspan>
    <tspan class="letter l11">E</tspan>
    <tspan class="letter l12">D</tspan>
  </text>

</svg>
