<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
 <defs>
   <filter id="glow">
     <feGaussianBlur stdDeviation="3" result="blur"/>
     <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
   </filter>
   <style>
     @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono');
     .txt {
       font-family: 'Share Tech Mono', monospace;
       font-size: 48px;
       fill: #ff1a1a;
       filter: url(#glow);
     }
     .cursor {
       fill: #ff1a1a;
       animation: blink 0.8s step-end infinite;
     }
     @keyframes blink {
       0%, 100% { opacity: 1; }
       50% { opacity: 0; }
     }
     .letter { opacity: 0; }
     .l1  { animation: show 0.05s 0.3s  forwards, flicker 3s 1.5s infinite; }
     .l2  { animation: show 0.05s 0.5s  forwards, flicker 3s 1.7s infinite; }
     .l3  { animation: show 0.05s 0.7s  forwards, flicker 3s 1.9s infinite; }
     .l4  { animation: show 0.05s 0.9s  forwards, flicker 3s 2.1s infinite; }
     .l5  { animation: show 0.05s 1.1s  forwards, flicker 3s 2.3s infinite; }
     .l6  { animation: show 0.05s 1.3s  forwards, flicker 3s 2.5s infinite; }
     .l7  { animation: show 0.05s 1.5s  forwards, flicker 3s 2.7s infinite; }
     .l8  { animation: show 0.05s 1.7s  forwards, flicker 3s 2.9s infinite; }
     .l9  { animation: show 0.05s 1.9s  forwards, flicker 3s 3.1s infinite; }
     .l10 { animation: show 0.05s 2.1s  forwards, flicker 3s 3.3s infinite; }
     .l11 { animation: show 0.05s 2.3s  forwards, flicker 3s 3.5s infinite; }
     .l12 { animation: show 0.05s 2.5s  forwards, flicker 3s 3.7s infinite; }
     .l13 { animation: show 0.05s 2.7s  forwards, flicker 3s 3.9s infinite; }
     @keyframes show    { to { opacity: 1; } }
     @keyframes flicker {
       0%,89%,91%,93%,100% { opacity: 1; }
       90%,92% { opacity: 0.1; }
     }
     .cur1 { animation: mov 2.8s steps(13,end) forwards; }
     @keyframes mov {
       0%  { transform: translateX(0px);   }
       100%{ transform: translateX(364px); }
     }
   </style>
 </defs>

 <!-- glow underline -->
 <rect x="20" y="95" width="0" height="3" fill="#ff1a1a" opacity="0.5">
   <animate attributeName="width" from="0" to="390" begin="2.8s" dur="0.3s" fill="freeze"/>
 </rect>

 <text class="txt" x="20" y="80">
   <tspan class="letter l1">A</tspan>
   <tspan class="letter l2">C</tspan>
   <tspan class="letter l3">C</tspan>
   <tspan class="letter l4">E</tspan>
   <tspan class="letter l5">S</tspan>
   <tspan class="letter l6">S</tspan>
   <tspan class="letter l7"> </tspan>
   <tspan class="letter l8">D</tspan>
   <tspan class="letter l9">E</tspan>
   <tspan class="letter l10">N</tspan>
   <tspan class="letter l11">I</tspan>
   <tspan class="letter l12">E</tspan>
   <tspan class="letter l13">D</tspan>
 </text>

 <!-- cursor -->
 <rect class="cursor cur1" x="20" y="40" width="3" height="50"/>
</svg>
